server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock_inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC

  jwt:
    secret: YnJhdmVOZXdXb3JsZDIwMjVUZXN0U2VjcmV0S2V5Rm9yU3RvY2tJbnZlbnRvcnk=

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html